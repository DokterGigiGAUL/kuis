<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Kasus</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/case.css">
</head>

<body>

<div class="case-container">

    <div class="flashcard" id="flashcard">

        <!-- FRONT -->
        <div class="card-face front">

            <div class="case-image">
                <img src="assets/cases/images/sample.jpg" alt="">
            </div>

            <div class="case-content">

                <div class="patient">
                    👤 Perempuan, 43 tahun
                </div>

                <h3>Anamnesis</h3>

                <p>
                    Pasien datang dengan keluhan luka putih pada mukosa pipi
                    kanan sejak tiga minggu yang lalu. Tidak terasa nyeri.
                </p>

                <div class="tap-hint">
                    ↻ Ketuk kartu untuk melihat diagnosis
                </div>

            </div>

        </div>

        <!-- BACK -->
        <div class="card-face back">

            <div class="diagnosis-title">
                Diagnosis
            </div>

            <div class="diagnosis-name">
                ORAL LICHEN PLANUS
            </div>

        </div>

    </div>

</div>

<script src="js/case.js"></script>

</body>
</html>
