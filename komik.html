<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Komik</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/comic.css">
  <!-- <style>
    .start-btn{
    margin: 0!important;
  }
  </style> -->
</head>
<body>

<main class="comic-page">

  <h1 id="comic-title"></h1>
  <div id="comic-image"></div>
  <div class="comic-navigation">
    <button id="prev-comic" class="comic-nav-btn">
      Sebelumnya
    </button>
    <button id="next-comic" class="comic-nav-btn">
      Berikutnya
    </button>
  </div>
  <div class="comic-actions">
    <a href="index.html">
      <button class="btn btn-primary start-btn">Kembali ke Beranda</button>
    </a>
  </div>

</main>

<div id="comic-modal" class="comic-modal">
  <div class="comic-modal-content">
    <h2>Daftar Komik</h2>
    <div id="comic-list"></div>
    <button id="close-modal">
      Tutup
    </button>
  </div>
</div>

<script src="js/comics-data.js"></script>
<script src="js/comic.js"></script>

</body>
</html>
