<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTS #1</title>

  <link rel="stylesheet" href="../../css/style.css">

  <style>

    .tts-header{
        max-width:900px;
        margin:30px auto 10px;
        padding:0 20px;
    }

    .tts-header h1{
        font-size:32px;
        font-weight:700;
        color:#1f2937;
    }

    iframe{
        width:100%;
        height:600px;
        padding:20px 20px 0;
        background:#f4f7fb;
        border:none;
        display:block;
        margin:auto;
    }

  </style>

</head>

<body>

<div class="tts-header">
    <h1 id="tts-title"></h1>
</div>

<iframe
    src="https://crosswordlabs.com/embed/tts-dwbo-2024">
</iframe>

<div class="comic-actions">
    <a href="../../index.html">
        <button class="start-btn">
            Kembali ke Beranda
        </button>
    </a>
</div>

<script>
const file = location.pathname.split("/").pop(); // tts1.html

const nomor = file.match(/\d+/)?.[0] || "";

document.getElementById("tts-title").textContent =
    `TTS #${nomor}`;

document.title = `TTS #${nomor}`;
</script>
  
</body>
</html>
