<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonder App Premium</title>

    <link rel="stylesheet" href="css/index.css">
</head>
<body>

<h1>Wonder App Premium</h1>

<p>Pilih cara mendapatkan akses ke konten Premium.</p>

<button id="buyItemBtn" class="btn btn-primary start-btn">Beli Konten Premium</button>
<button id="subscribeBtn" class="btn btn-primary start-btn">Wonder App Premium</button>
  
<script src="js/premium.js"></script>

<script>
const params = new URLSearchParams(location.search);

const productId = params.get("product");

const buyItemBtn = document.getElementById("buyItemBtn");
const subscribeBtn = document.getElementById("subscribeBtn");

if (!productId) {
    buyItemBtn.style.display = "none";
}

buyItemBtn.onclick = () => {

    buyProduct(productId);

};

subscribeBtn.onclick = () => {

    subscribePremium();

};
</script>

</body>
</html>
