<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonder App Premium</title>

    <link rel="stylesheet" href="css/index.css">
</head>
<body>

<main class="premium-page">

    <div class="premium-header">
        <div class="premium-icon">👑</div>

        <h1>Wonder App Premium</h1>

        <p>
            Dapatkan akses ke seluruh fitur Premium atau beli konten tertentu sesuai kebutuhan Anda.
        </p>
    </div>

    <section class="premium-card">

        <button
            id="buyItemBtn"
            class="btn btn-primary start-btn">
            Beli Konten Ini
        </button>

        <button
            id="subscribeBtn"
            class="btn btn-primary start-btn">
            Berlangganan Wonder App Premium
        </button>

        <ul class="premium-benefits">
            <li>✔️ Akses seluruh konten Premium</li>
            <li>✔️ Update konten baru selama berlangganan</li>
            <li>✔️ Dukung pengembangan Wonder App</li>
        </ul>

    </section>

</main>

<script src="js/premium.js"></script>

<script>
const params = new URLSearchParams(location.search);

const productId = params.get("product");

const buyItemBtn = document.getElementById("buyItemBtn");
const subscribeBtn = document.getElementById("subscribeBtn");

if (!productId) {
    buyItemBtn.style.display = "none";
}

buyItemBtn.onclick = () => {

    buyProduct(productId);

};

subscribeBtn.onclick = () => {

    subscribePremium();

};
</script>

</body>
</html>
