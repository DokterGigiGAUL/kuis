<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossword</title>

    <link rel="stylesheet" href="css/tts.css">
</head>
<body>

<div id="loader" class="loader">
    Loading TTS...
</div>

<main class="page" id="crossword-app" style="display:none;">

        <!-- Header -->
        <header class="header">
            <h1 id="puzzle-title">Memuat...</h1>

            <div class="toolbar">

                <button id="reset-btn">
                    Reset
                </button>
                
                <button id="hint-btn" class="premium-btn">
                    Hint ★
                </button>

                <button id="reveal-btn" class="premium-btn">
                    Reveal ★
                </button>
                
            </div>
<button id="home-btn" class="tts-btn">
    ← Kembali ke Beranda
</button>
        </header>

        <!-- Progress -->
        <section class="progress-wrapper">

            <div class="progress-top">
                <span>Progress</span>
                <span id="progress-text">0%</span>
            </div>

            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>

        </section>

        <!-- Crossword -->
        <section class="crossword-section">

            <div id="crossword-grid"></div>

        </section>

        <!-- Clue Aktif -->
<section class="active-clue-section">

    <div class="active-clue-card">

        <div class="active-clue-header">
            <span id="active-number">1</span>
            <span id="active-direction">Mendatar</span>
            
        </div>

        <div id="active-clue-text" class="active-clue-text">
            Pilih kotak untuk mulai bermain.
        </div>

        <div id="active-answer" class="active-answer"></div>

    </div>

</section>

    </main>

    <script src="js/engine.js"></script>
    <script src="js/tts.js"></script>

</body>
</html>
