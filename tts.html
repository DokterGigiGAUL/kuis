<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossword</title>
        <link rel="stylesheet" href="css/index.css">
        <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/tts.css">
</head>

<body>

    <div id="loader" class="loader">
        Loading TTS...
    </div>

    <header class="tts-header">
        <button id="home-btn" class="tts-back-btn">
        ←
        </button>
    <div class="tts-title-box">
        <h2 id="puzzle-title">Memuat...</h2>
    </div>
</header>
    
<main class="page" id="crossword-app" style="display:none;">
    <div class="toolbar">
      <button id="hint-btn" class="premium-btn">
            Hint ★
        </button>
        <button id="reveal-btn" class="premium-btn">
            Reveal ★
        </button>
        <button id="reset-btn">
            Reset
        </button>
    </div>
        <!-- Progress -->
        <section class="progress-wrapper">
            <div class="progress-top">
                <span>Progress</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </section>

        <!-- Crossword -->
        <section class="crossword-section">
            <div id="crossword-grid"></div>
        </section>

        <!-- Clue Aktif -->
        <section class="active-clue-section">
            <div class="active-clue-card">
                <div class="active-clue-header">
                    <span id="active-number">1</span>
                    <span id="active-direction">Mendatar</span>
                </div>
                <div id="active-clue-text" class="active-clue-text">
                    Pilih kotak untuk mulai bermain.
                </div>
                <div id="active-answer" class="active-answer"></div>
            </div>
        </section>
    </main>

    <script src="js/storage.js"></script>
<script src="js/tts-data.js"></script>
<script src="js/purchase-manager.js"></script>
<script src="js/premium.js"></script> <!-- jika showPremiumDialog() ada di sini -->
<script src="js/tts.js"></script>

</body>
</html>
