<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekam Silang — TTS Kedokteran Gigi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Inter:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/tekatekisilang.css">

</head>
<body>
<div class="wrap">

  <div class="chart-card">
    <div class="chart-head">
      <div>
        <h1>TTS Kedokteran Gigi</h1>
      </div>
    </div>
    <div class="fields">
      <p><b>SOAL: 5</b></p>
      <p>Klik kotak atau daftar pertanyaan untuk mulai. Ketuk kotak 2 kali untuk merubah arah mendatar/ menurun</p>
    </div>
  </div>

  <div class="board">
    <div class="paneltts">
      <div id="grid"></div>

    </div>

    <div class="panel">
      <h2>Soal</h2>
      <div id="clues"></div>
      <div class="controls">
        <button id="checkBtn">Periksa Jawaban</button>
        <button id="resetBtn" class="secondary">Reset</button>
      </div>
      <div id="status"></div>
    </div>
  </div>

</div>

<script src="js/tekatekisilang.js"></script>
</body>
</html>
