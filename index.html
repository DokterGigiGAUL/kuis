<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuis Penyakit Mulut</title>

    <link rel="stylesheet" href="css/index.css" />
        <link rel="stylesheet" href="css/style.css" />

  </head>

  <body>
    <header class="header">
      <h1>Penyakit Mulut Wonder App</h1>
    </header>

    <main class="container">

      <section id="featured-hero" class="featured-hero">
        <div class="featured-overlay">
          <span class="featured-badge" style="display:none;"></span>
          <span class="featured-item">✭ Baru</span>
          <h2 class="featured-title"></h2>
          <p class="featured-description"></p>
          <button class="btn btn-primary featured-btn"></button>
        </div>
          <div id="featured-latest" class="featured-latest"></div>
      </section>
      
      <!-- Template Card -->
<section class="home-section">
    <div class="section-header">
        <h2>Kuis</h2>
        <a href="explore.html?tab=quiz">Lihat semua →</a>
    </div>

    <div id="quiz-list" class="horizontal-scroll"></div>
</section>

<section class="home-section">
    <div class="section-header">
        <h2>Kartu Kasus</h2>
        <a href="explore.html?tab=case">Lihat semua →</a>
    </div>

    <div id="case-container" class="horizontal-scroll"></div>
</section>
      
<section class="home-section">
    <div class="section-header">
        <h2>TTS</h2>
        <a href="explore.html?tab=tts">Lihat semua →</a>
    </div>

    <div id="tts-container" class="horizontal-scroll"></div>
</section>
        
<section class="home-section">
    <div class="section-header">
        <h2>Komik</h2>
        <a href="explore.html?tab=comic">Lihat semua →</a>
    </div>

    <div id="comics-container" class="horizontal-scroll"></div>
</section>
        
    </main>

    <!-- Template -->
      
<template id="content-card-template">
    <article class="content-card">

        <img
            class="content-thumb"
            loading="lazy"
            alt="">

        <div class="content-info">
            <h3 class="content-title"></h3>
            <p class="content-description"></p>
            <button class="btn btn-primary content-btn">
                Buka
            </button>
        </div>
    </article>
</template>

    <template id="featured-card-template">
    <article class="featured-card">

        <img
            class="featured-card-thumb"
            loading="lazy"
            alt="">

        <div class="featured-card-info">

            <span class="featured-card-type"></span>

            <h3 class="featured-card-title"></h3>

        </div>

    </article>
</template>
  
  <script src="js/storage.js"></script>
  <script src="js/quiz-data.js"></script>
  <script src="js/comics-data.js"></script>
  <script src="js/tts-data.js"></script>
  <script src="js/case-data.js"></script>
  <script src="js/premium.js"></script>
  <script src="js/index.js"></script>
  <!-- <script src="js/app.js"></script> -->
    
  </body>

</html>
