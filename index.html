// Factory: setiap panggilan createQuiz() menghasilkan instance TERISOLASI
// (variabel current/selected/timeLeft ada di closure masing-masing, elemen dicari
// hanya di dalam 'root' miliknya sendiri lewat querySelector, bukan getElementById global)
function createQuiz(root, { questions, timeMinutes }) {
  const totalTime = timeMinutes * 60;
  let current = 0;
  let selected = Array(questions.length).fill(null);
  let timeLeft = totalTime;
  let timerInterval = null;

  const el = (role) => root.querySelector(`[data-role="${role}"]`);

  function start() {
    selected = Array(questions.length).fill(null);
    current = 0;
    timeLeft = totalTime;
    el('stage-intro').classList.add('hidden');
    el('stage-result').classList.add('hidden');
    el('stage-quiz').classList.remove('hidden');
    render();
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimer();
      if (timeLeft <= 0) { clearInterval(timerInterval); finish(); }
    }, 1000);
    updateTimer();
  }

  function updateTimer() {
    const m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
    const s = String(timeLeft % 60).padStart(2, '0');
    const t = el('timer');
    t.textContent = `${m}:${s}`;
    t.classList.toggle('warn', timeLeft <= 30);
  }

  function render() {
    const item = questions[current];
    el('qcount').textContent = `Soal ${current + 1} / ${questions.length}`;
    el('progress-fill').style.width = ((current + 1) / questions.length * 100) + '%';
    el('qtext').textContent = item.q;

    const optsDiv = el('options');
    optsDiv.innerHTML = '';
    item.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt' + (selected[current] === i ? ' selected' : '');
      btn.innerHTML = `<b>${String.fromCharCode(65 + i)}.</b>${opt}`;
      btn.onclick = () => { selected[current] = i; render(); };
      optsDiv.appendChild(btn);
    });

    el('prev-btn').disabled = current === 0;
    el('next-btn').classList.toggle('hidden', current === questions.length - 1);
    el('finish-btn').classList.toggle('hidden', current !== questions.length - 1);
    el('answered-count').textContent = `${selected.filter(s => s !== null).length}/${questions.length} terjawab`;
  }

  function finish() {
    clearInterval(timerInterval);
    el('stage-quiz').classList.add('hidden');
    el('stage-result').classList.remove('hidden');

    const score = selected.reduce((acc, sel, i) => acc + (sel === questions[i].answer ? 1 : 0), 0);
    el('score-num').textContent = `${score} / ${questions.length}`;
    el('score-pct').textContent = `Benar ${score} dari ${questions.length} soal (${Math.round(score / questions.length * 100)}%)`;

    const list = el('review-list');
    list.innerHTML = '';
    questions.forEach((item, i) => {
      const userAns = selected[i];
      const isCorrect = userAns === item.answer;
      const div = document.createElement('div');
      div.className = 'review-item';
      div.innerHTML = `
        <div class="review-q">
          <span class="mark ${isCorrect ? 'ok' : 'bad'}">${isCorrect ? '✓' : '✕'}</span>
          <span>${i + 1}. ${item.q}</span>
        </div>
        <div class="user-ans" style="color:${userAns === null ? '#94a3b8' : (isCorrect ? '#10b981' : '#ef4444')}">
          Jawaban Anda: ${userAns === null ? 'Tidak dijawab' : String.fromCharCode(65 + userAns) + '. ' + item.options[userAns]}
        </div>
        ${!isCorrect ? `<div class="correct-ans">Jawaban benar: ${String.fromCharCode(65 + item.answer)}. ${item.options[item.answer]}</div>` : ''}
        <div class="explanation">${item.explanation}</div>
      `;
      list.appendChild(div);
    });
  }

  el('start-btn').addEventListener('click', start);
  el('restart-btn').addEventListener('click', start);
  el('prev-btn').addEventListener('click', () => { if (current > 0) { current--; render(); } });
  el('next-btn').addEventListener('click', () => { if (current < questions.length - 1) { current++; render(); } });
  el('finish-btn').addEventListener('click', finish);
}

// Inisialisasi SEMUA kuis di halaman ini secara otomatis.
// Untuk nambah kuis ke-3, ke-4, dst: tinggal copy blok <div class="quiz-instance" data-quiz="quiz3">...</div>
// di HTML dan tambahkan quiz3: {...} di QUIZ_DATA di atas.
document.querySelectorAll('.quiz-instance').forEach(root => {
  const key = root.dataset.quiz;
  const config = QUIZ_DATA[key];
  if (config) createQuiz(root, config);
});
</script>
