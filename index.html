<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Kuis Oral Medicine</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://doktergigigaul.github.io/kuis/quiz_data.js"></script>

<style>
  .quiz-app {
    font-family: 'Plus Jakarta Sans', 'SF Pro Display', system-ui, -apple-system, sans-serif;
  }
  /* Custom scrollbar untuk navigasi soal jika melebihi layar */
  .custom-scroll::-webkit-scrollbar { height: 4px; }
  .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
</style>

<div class="quiz-app max-w-3xl mx-auto my-6 p-4 md:p-6 bg-white rounded-2xl shadow-sm border border-gray-100 text-gray-800">
  
  <div id="state-dashboard" class="block">
    <div class="border-b border-gray-100 pb-4 mb-6">
      <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Kuis Interaktif Penyakit Mulut</h2>
      <p class="text-gray-500 text-sm mt-1">Pilih salah satu modul di bawah ini untuk menguji kemampuan analisis klinis Anda.</p>
    </div>
    <div id="quiz-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
  </div>

  <div id="state-quiz" class="hidden">
    <div class="flex justify-between items-center border-b border-gray-100 pb-4 mb-5">
      <div>
        <h3 id="active-quiz-title" class="font-bold text-base text-gray-900 leading-tight">Judul Kuis</h3>
        <span id="quiz-progress-text" class="text-xs font-medium text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full inline-block mt-1">Soal 1 dari 10</span>
      </div>
      <div id="quiz-timer" class="font-mono font-bold text-lg text-red-600 bg-red-50 border border-red-100 px-3 py-1 rounded-xl shadow-xs transition-all duration-300">
        10:00
      </div>
    </div>

    <div id="question-nav-grid" class="flex items-center gap-1.5 overflow-x-auto pb-3 mb-5 custom-scroll">
      </div>

    <div class="bg-gray-50/50 rounded-xl p-4 md:p-5 border border-gray-100 mb-6">
      <p id="quiz-question-text" class="font-medium text-gray-900 text-base leading-relaxed mb-4">Teks Pertanyaan Kasus...</p>
      <div id="quiz-options-list" class="space-y-2.5">
        </div>
    </div>

    <div class="flex justify-between items-center pt-2 border-t border-gray-100">
      <button onclick="changeQuestion(-1)" id="btn-prev-q" class="px-4 py-2 text-sm font-medium bg-gray-100 text-gray-600 rounded-xl hover:bg-gray-200 transition disabled:opacity-40">
        Sebelumnya
      </button>
      <button onclick="changeQuestion(1)" id="btn-next-q" class="px-4 py-2 text-sm font-medium bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition">
        Selanjutnya
      </button>
      <button onclick="confirmSubmitQuiz()" id="btn-submit-q" class="hidden px-5 py-2 text-sm font-bold bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 transition shadow-xs">
        Selesai & Kumpulkan
      </button>
    </div>
  </div>

  <div id="state-result" class="hidden">
    <div class="text-center bg-gray-50 border border-gray-100 rounded-2xl p-6 mb-6">
      <h3 class="text-lg font-bold text-gray-500 uppercase tracking-wider text-xs">Hasil Evaluasi Anda</h3>
      <div id="score-display" class="text-5xl font-extrabold text-blue-600 my-2">0/100</div>
      <p id="score-summary-text" class="text-sm text-gray-600 max-w-md mx-auto">Ringkasan performa pengerjaan kuis.</p>
      <button onclick="backToDashboard()" class="mt-4 px-4 py-2 text-xs font-semibold bg-white border border-gray-200 text-gray-700 rounded-xl hover:bg-gray-50 transition shadow-2xs">
        Kembali ke Dashboard
      </button>
    </div>

    <h4 class="font-bold text-gray-900 text-base mb-3">Review & Pembahasan Soal</h4>
    <div id="review-questions-container" class="space-y-6">
      </div>
  </div>

</div>

<script>
  // Global Application State Management
  let currentQuiz = null;
  let currentQuestionIndex = 0;
  let userAnswers = {}; // Format: { questionId: selectedOptionIndex }
  let timerInterval = null;
  let timeRemaining = 0;

  // Inisialisasi Aplikasi saat Dokumen Siap
  document.addEventListener("DOMContentLoaded", () => {
    if (typeof QUIZ_DATA !== 'undefined') {
      renderDashboard();
    } else {
      document.getElementById('quiz-grid').innerHTML = `
        <div class="col-span-2 p-4 bg-red-50 text-red-700 border border-red-200 rounded-xl text-xs">
          <strong>Gagal Memuat Bank Soal:</strong> Pastikan path file <code>quiz_data.js</code> eksternal sudah dikonfigurasi dengan benar.
        </div>`;
    }
  });

  // Render Pilihan Kuis di Dashboard Utama
  function renderDashboard() {
    const grid = document.getElementById('quiz-grid');
    grid.innerHTML = '';
    
    QUIZ_DATA.forEach(quiz => {
      const card = document.createElement('div');
      card.className = "p-5 border border-gray-200 rounded-xl hover:border-blue-500 hover:shadow-xs transition duration-200 cursor-pointer flex flex-col justify-between bg-white";
      card.onclick = () => startQuizEngine(quiz.id);
      
      card.innerHTML = `
        <div>
          <div class="flex justify-between items-start gap-2">
            <span class="text-[10px] font-bold tracking-wider uppercase bg-blue-50 text-blue-600 px-2 py-0.5 rounded-md">${quiz.questions.length} Soal</span>
            <span class="text-[10px] font-bold tracking-wider uppercase bg-gray-50 text-gray-500 px-2 py-0.5 rounded-md">${quiz.duration / 60} Menit</span>
          </div>
          <h3 class="font-bold text-base text-gray-900 mt-2.5 leading-snug">${quiz.title}</h3>
          <p class="text-xs text-gray-500 mt-1.5 leading-relaxed">${quiz.description}</p>
        </div>
        <div class="mt-4 pt-3 border-t border-gray-50 flex justify-end">
          <span class="text-xs font-bold text-blue-600 inline-flex items-center gap-1">Mulai Kuis &rarr;</span>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  // Fungsi Memulai Kuis yang Dipilih
  function startQuizEngine(quizId) {
    currentQuiz = QUIZ_DATA.find(q => q.id === quizId);
    if (!currentQuiz) return;

    currentQuestionIndex = 0;
    userAnswers = {};
    timeRemaining = currentQuiz.duration;

    // Sinkronisasi Komponen View
    document.getElementById('active-quiz-title').innerText = currentQuiz.title;
    document.getElementById('state-dashboard').classList.add('hidden');
    document.getElementById('state-quiz').classList.remove('hidden');

    // Jalankan Subsistem
    renderQuestionNavigation();
    showQuestion(0);
    startTimerEngine();
  }

  // Logika Countdown Timer
  function startTimerEngine() {
    clearInterval(timerInterval);
    updateTimerDisplay();

    timerInterval = setInterval(() => {
      timeRemaining--;
      updateTimerDisplay();

      // Warning visual jika waktu tersisa di bawah 1 menit
      if (timeRemaining <= 60) {
        const timerBox = document.getElementById('quiz-timer');
        timerBox.classList.add('bg-red-500', 'text-white', 'animate-pulse');
      }

      if (timeRemaining <= 0) {
        clearInterval(timerInterval);
        alert('Waktu Anda telah habis! Kuis akan dikumpulkan otomatis.');
        submitQuizCalculation();
      }
    }, 1000);
  }

  function updateTimerDisplay() {
    const minutes = Math.floor(timeRemaining / 60);
    const seconds = timeRemaining % 60;
    document.getElementById('quiz-timer').innerText = 
      `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
  }

  // Render Barisan Navigasi Kotak Nomor Soal
  function renderQuestionNavigation() {
    const navGrid = document.getElementById('question-nav-grid');
    navGrid.innerHTML = '';

    currentQuiz.questions.forEach((_, idx) => {
      const btn = document.createElement('button');
      btn.id = `nav-item-${idx}`;
      btn.innerText = idx + 1;
      btn.onclick = () => showQuestion(idx);
      btn.className = "w-8 h-8 min-w-[32px] text-xs font-bold rounded-lg border transition duration-150 flex-none flex items-center justify-center cursor-pointer";
      
      // Default style (belum dijawab)
      btn.classList.add('bg-white', 'border-gray-200', 'text-gray-600', 'hover:border-gray-400');
      navGrid.appendChild(btn);
    });
  }

  // Update Tampilan Status Warna Navigasi Soal
  function updateNavigationHighlight() {
    currentQuiz.questions.forEach((_, idx) => {
      const btn = document.getElementById(`nav-item-${idx}`);
      if (!btn) return;

      // Reset base classes
      btn.className = "w-8 h-8 min-w-[32px] text-xs font-bold rounded-lg border transition duration-150 flex-none flex items-center justify-center cursor-pointer";

      if (idx === currentQuestionIndex) {
        // Sedang aktif dilihat
        btn.classList.add('bg-blue-600', 'border-blue-600', 'text-white', 'ring-2', 'ring-blue-100');
      } else if (userAnswers[currentQuiz.questions[idx].id] !== undefined) {
        // Sudah diisi/dijawab
        btn.classList.add('bg-blue-50', 'border-blue-200', 'text-blue-600');
      } else {
        // Belum diisi
        btn.classList.add('bg-white', 'border-gray-200', 'text-gray-600', 'hover:border-gray-400');
      }
    });
  }

  // Render Data Soal Berdasarkan Indeks Aktif
  function showQuestion(index) {
    currentQuestionIndex = index;
    const question = currentQuiz.questions[index];
    
    // Progress text
    document.getElementById('quiz-progress-text').innerText = `Soal ${index + 1} dari ${currentQuiz.questions.length}`;
    document.getElementById('quiz-question-text').innerText = `${index + 1}. ${question.question}`;

    // Render Opsi Jawaban
    const optionsContainer = document.getElementById('quiz-options-list');
    optionsContainer.innerHTML = '';

    question.options.forEach((option, optIdx) => {
      const isSelected = userAnswers[question.id] === optIdx;
      
      const optionWrapper = document.createElement('label');
      optionWrapper.className = `flex items-start gap-3 p-3.5 rounded-xl border transition cursor-pointer ${
        isSelected 
          ? 'bg-blue-50/70 border-blue-400 ring-1 ring-blue-400 text-blue-900' 
          : 'bg-white border-gray-200 hover:bg-gray-50 text-gray-700'
      }`;

      optionWrapper.innerHTML = `
        <input type="radio" name="quiz-option" value="${optIdx}" ${isSelected ? 'checked' : ''} 
          class="mt-0.5 text-blue-600 border-gray-300 focus:ring-blue-500" 
          onchange="saveAnswer(${question.id}, ${optIdx})">
        <span class="text-sm font-medium leading-tight">${option}</span>
      `;
      optionsContainer.appendChild(optionWrapper);
    });

    // Kontrol Tombol Navigasi Bawah
    document.getElementById('btn-prev-q').disabled = index === 0;
    
    if (index === currentQuiz.questions.length - 1) {
      document.getElementById('btn-next-q').classList.add('hidden');
      document.getElementById('btn-submit-q').classList.remove('hidden');
    } else {
      document.getElementById('btn-next-q').classList.remove('hidden');
      document.getElementById('btn-submit-q').classList.add('hidden');
    }

    updateNavigationHighlight();
  }

  // Fungsi Menyimpan Jawaban Pilihan User
  function saveAnswer(questionId, selectedIdx) {
    userAnswers[questionId] = selectedIdx;
    showQuestion(currentQuestionIndex); // Re-render untuk efek visual aktif
  }

  // Fungsi Ganti Soal via Tombol Next/Prev
  function changeQuestion(direction) {
    const targetIndex = currentQuestionIndex + direction;
    if (targetIndex >= 0 && targetIndex < currentQuiz.questions.length) {
      showQuestion(targetIndex);
    }
  }

  // Konfirmasi Manual Selesai Kuis
  function confirmSubmitQuiz() {
    const totalSoal = currentQuiz.questions.length;
    const terjawab = Object.keys(userAnswers).length;
    
    let msg = "Apakah Anda yakin ingin mengumpulkan kuis ini?";
    if (terjawab < totalSoal) {
      msg = `Peringatan: Anda baru mengisi ${terjawab} dari ${totalSoal} soal.\n\n${msg}`;
    }

    if (confirm(msg)) {
      submitQuizCalculation();
    }
  }

  // Hitung Skor Akhir & Tampilkan Pembahasan
  function submitQuizCalculation() {
    clearInterval(timerInterval);
    
    // Reset status box timer ke semula
    const timerBox = document.getElementById('quiz-timer');
    timerBox.className = "font-mono font-bold text-lg text-red-600 bg-red-50 border border-red-100 px-3 py-1 rounded-xl shadow-xs";

    let correctCount = 0;
    const totalQuestions = currentQuiz.questions.length;

    // Render Box Pembahasan Sekaligus
    const reviewContainer = document.getElementById('review-questions-container');
    reviewContainer.innerHTML = '';

    currentQuiz.questions.forEach((q, idx) => {
      const userAns = userAnswers[q.id];
      const isCorrect = userAns === q.correctAnswer;
      if (isCorrect) correctCount++;

      const reviewItem = document.createElement('div');
      reviewItem.className = "border border-gray-200 rounded-xl p-4 bg-white shadow-2xs";
      
      // Build Opsi List untuk Review
      let optionsHtml = '';
      q.options.forEach((opt, optIdx) => {
        let optStyle = "p-2.5 rounded-lg text-sm border border-gray-100 bg-gray-50 text-gray-500";
        let marker = "";

        if (optIdx === q.correctAnswer) {
          // Jawaban yang Benar (Selalu Hijau)
          optStyle = "p-2.5 rounded-lg text-sm border border-emerald-200 bg-emerald-50 text-emerald-900 font-medium flex items-center justify-between";
          marker = '<span class="text-emerald-600 font-bold text-xs bg-white border border-emerald-200 px-1.5 py-0.5 rounded">Kunci Jawaban</span>';
        } else if (optIdx === userAns && !isCorrect) {
          // Jawaban Anda Salah (Merah)
          optStyle = "p-2.5 rounded-lg text-sm border border-red-200 bg-red-50 text-red-900 font-medium flex items-center justify-between";
          marker = '<span class="text-red-600 font-bold text-xs bg-white border border-red-200 px-1.5 py-0.5 rounded">Jawaban Anda Salah</span>';
        } else if (optIdx === userAns && isCorrect) {
          // Jawaban Anda Benar
          marker = '<span class="text-emerald-600 font-bold text-xs bg-white border border-emerald-200 px-1.5 py-0.5 rounded">Pilihan Anda (Benar)</span>';
        }

        optionsHtml += `<div class="${optStyle}"><span>${opt}</span>${marker}</div>`;
      });

      reviewItem.innerHTML = `
        <div class="flex items-start gap-2.5 mb-3">
          <span class="w-6 h-6 min-w-[24px] text-xs font-bold rounded-full flex items-center justify-center ${
            isCorrect ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'
          }">${idx + 1}</span>
          <p class="font-semibold text-gray-900 text-sm leading-relaxed pt-0.5">${q.question}</p>
        </div>
        <div class="space-y-1.5 ml-8.5 mb-4">${optionsHtml}</div>
        <div class="ml-8.5 p-3.5 bg-blue-50/50 border border-blue-100/70 rounded-xl">
          <h5 class="text-xs font-bold text-blue-800 uppercase tracking-wider mb-1">Pembahasan Klinis:</h5>
          <p class="text-xs text-blue-900/90 leading-relaxed">${q.explanation}</p>
        </div>
      `;
      reviewContainer.appendChild(reviewItem);
    });

    // Kalkulasi Skor Nilai Skala 100
    const finalScore = Math.round((correctCount / totalQuestions) * 100);
    document.getElementById('score-display').innerText = `${finalScore}/100`;
    document.getElementById('score-summary-text').innerText = 
      `Anda menjawab benar ${correctCount} dari ${totalQuestions} soal. Silakan pelajari pembahasan klinis di bawah ini untuk pendalaman materi.`;

    // Switch State Screen View
    document.getElementById('state-quiz').classList.add('hidden');
    document.getElementById('state-result').classList.remove('hidden');
  }

  // Kembali ke Dashboard Menu
  function backToDashboard() {
    document.getElementById('state-result').classList.add('hidden');
    document.getElementById('state-dashboard').classList.remove('hidden');
    currentQuiz = null;
  }
</script>
</body>
</html>
