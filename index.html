<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Penyakit Mulut</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
    <h1>Penyakit Mulut Wonder App</h1>
    <p>Karena masalah di mulut bukan cuma gigi!</p>
</header>

<main class="container">

<section class="judul"><h2>Kuis Trivia</h2></section>
    <!-- Daftar Kuis -->
    <section id="quiz-list" class="quiz-grid">

        <!-- Card akan dibuat otomatis oleh app.js -->

    </section>

    
</main>

<!-- Template Card -->
<template id="quiz-card-template">

    <div class="quiz-card">

        <img class="quiz-thumbnail"
             src=""
             alt="Thumbnail">

        <div class="quiz-content">
            <h2 class="quiz-title"></h2>
            <p class="quiz-description"></p>
            <div class="quiz-info">
                <span>📄 10 Soal</span>
                <span>⏱ 10 Menit</span>
            </div>
            <button class="start-btn">
                Mulai Kuis
            </button>

        </div>

    </div>

</template>

<section id="comics" class="section">
  <div class="section-header">
    <h2>Komik</h2>
  </div>

  <div id="comics-container" class="comics-grid">
    <!-- Card komik akan dibuat oleh JavaScript -->
  </div>
</section>
    
<script src="js/storage.js"></script>
<script src="js/app.js"></script>

</body>
</html>
