<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuis Penyakit Mulut</title>
 <!--  <link rel="preload" as="image" href="..."> -->
    <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="css/case.css" />
  </head>

  <body>
    <header class="header">
      <h1>Penyakit Mulut Wonder App</h1>
    </header>

    <main class="container">

      <!-- Template Card -->
      <div class="section-header">
        <h2>Kuis Trivia</h2>
        <a id="quizExplore" class="section-link" href="explore.html?tab=quiz">
    Kuis Lainnya →
</a>
      </div>

      <section id="quiz-list" class="quiz-grid">
        <!-- Card akan dibuat otomatis oleh app.js -->
      </section>

      <div class="section-header" style="margin-top: 40px;">
        <h2>Komik Edukasi</h2>
        <a id="comicExplore" class="section-link" href="explore.html?tab=comic">
    Episode Lainnya →
</a>
      </div>

      <section
        id="comics-container"
        class="comics-grid">
        <!-- Card akan dibuat otomatis oleh app.js -->
      </section>

      <div class="section-header" style="margin-top: 40px;">
        <h2>Teka-Teki Silang</h2>
        <a id="ttsExplore" class="section-link" href="explore.html?tab=tts">
    TTS Lainnya →
</a>
      </div>

      <section id="tts-container" class="tts-grid">
        <!-- Card TTS akan dibuat otomatis oleh app.js -->
      </section>
      
      <div class="section-header" style="margin-top: 40px;">
        <h2>Flashcards</h2>
        <a id="caseExplore" class="section-link" href="explore.html?tab=case">
          Kasus Lainnya →
        </a>
      </div>

<section id="case-container" class="quiz-grid">
  <!-- Card Kartu Kasus -->
</section>
    </main>

    <!-- Template Card -->
      
    <template id="quiz-card-template">
      <div class="quiz-card">
<img
    class="quiz-thumbnail"
    src=""
    alt="Thumbnail Kuis"
    loading="lazy"
    decoding="async"
/>

        <div class="quiz-content">
          <h2 class="quiz-title"></h2>
         <p class="quiz-description" style="display:none;"></p> 
          <div class="quiz-info">
            <span>⏱ 10 Menit</span>
            <span style="display:none;">📄 10 Soal</span> 
          </div>
          <button class="btn btn-primary start-btn">Mulai Kuis</button>
        </div>
      </div>
    </template>

    <template id="tts-card-template">
      <div class="tts-card">
<img
    class="tts-thumbnail"
    src=""
    alt="Thumbnail TTS"
    loading="lazy"
    decoding="async"
/>

        <div class="tts-content">
          <h3 class="tts-title"></h3>
          <p class="tts-soal"></p>
          <button class="btn btn-primary tts-btn">Isi TTS</button>
        </div>
      </div>
    </template>
    
    <template id="case-card-template">
  <div class="quiz-card">
    <img
      class="case-thumbnail"
      src=""
      alt="Thumbnail Kasus"
      loading="lazy"
      decoding="async"
    />

    <div class="quiz-content">
      <h3 class="case-title"></h3>
      <p class="case-description"></p>

      <div class="quiz-info">
        <span>🃏 Apa diagnosisnya?</span>
      </div> 

      <button class="btn btn-primary case-btn">
        Lihat Kasus
      </button>
    </div>
  </div>
</template>

        <template id="comic-card-template">
      <article class="comic-card">
        <div class="comic-cover">
<img
    class="comic-thumb"
    loading="lazy"
    decoding="async"
    alt="Thumbnail Komik"
/>
          <div class="comic-overlay">
            <div class="comic-episode"></div>
            <h3 class="comic-title"></h3>
          </div>
        </div>

        <div class="comic-content">
          <button class="btn btn-primary comic-btn">Baca Komik</button>
        </div>
      </article>
    </template>


    <script src="js/storage.js"></script>
    <script src="js/quiz-data.js"></script>
    <script src="js/comics-data.js"></script>
    <script src="js/tts-data.js"></script>
    <script src="js/case-data.js"></script>

    <script src="js/app.js"></script>
  </body>
</html>
