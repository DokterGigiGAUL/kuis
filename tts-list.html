<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Teka-Teki Silang</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="page-header">

    <button onclick="history.back()"
            class="back-btn">

        ←

    </button>

    <h1>Teka-Teki Silang</h1>

</header>

<main>

    <div id="tts-list"
         class="card-grid">
    </div>

</main>

<template id="tts-card-template">

    <div class="tts-card">
        <img class="tts-thumb">
        <div class="tts-content">
            <h3 class="tts-title"></h3>
            <p class="tts-description"></p>
            <p class="tts-soal"></p>
            <button class="tts-btn">
                Isi TTS
            </button>
        </div>

    </div>

</template>

<script src="js/tts.js"></script>
<script src="js/tts-list.js"></script>
      
</body>

</html>
