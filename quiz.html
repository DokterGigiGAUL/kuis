<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Penyakit Mulut</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="quiz-header">

    <button id="backBtn" class="quiz-back-btn">
        ←
    </button>

    <div class="quiz-title-box">
        <h2 id="quizTitle">Kuis</h2>
        <p id="questionCounter">Soal 1 dari 10</p>
    </div>

    <div id="timer" class="timer">
        10:00
    </div>

</header>

<main class="quiz-container">

    <div class="progress">

        <div id="progressBar" class="progress-bar"></div>

    </div>

    <div class="question-card">

        <img
            id="questionImage"
            class="question-image"
            src=""
            alt="Gambar Soal"
        >

        <h3 id="questionText"></h3>

        <div id="choices" class="choices"></div>

    </div>

    <div class="navigation">

        <button id="prevBtn" class="nav-btn">
            Sebelumnya
        </button>

        <button id="nextBtn" class="nav-btn primary">
            Selanjutnya
        </button>

    </div>

</main>

<script src="js/storage.js"></script>
<script src="js/timer.js"></script>
<script src="js/quiz.js"></script>

</body>
</html>
