<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Explore</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<header class="section-header">

    <h1 id="pageTitle">
        Explore
    </h1>

</header>


<main class="container">
    
    <div class="section-header">
        <h1 id="pageTitle">
        Eksplor
    </h1>
    </div>
    <div class="explore-tabs">

        <button
            id="quizTab"
            class="tab-btn">

            Kuis

        </button>

        <button
            id="comicTab"
            class="tab-btn">

            Komik

        </button>

    </div>


    <section
        id="quiz-list"
        class="card-grid">

    </section>


    <section
        id="comics-container"
        class="card-grid">

    </section>

</main>



<!-- TEMPLATE QUIZ -->

<template id="quiz-card-template">

<div class="quiz-card">

    <img class="quiz-thumbnail">

    <div class="quiz-content">

        <h3 class="quiz-title"></h3>

        <p class="quiz-description"></p>

        <div class="quiz-info">

            <span>📄 10 Soal</span>

            <span>⏱ 10 Menit</span>

        </div>

        <button class="start-btn">

            Mulai Kuis

        </button>

    </div>

</div>

</template>



<!-- TEMPLATE KOMIK -->

<template id="comic-card-template">

<div class="comic-card">

    <div class="comic-cover">

        <img class="comic-thumb">

        <div class="comic-overlay">

            <div class="comic-episode"></div>

            <h3 class="comic-title"></h3>

        </div>

    </div>

    <div class="comic-content">

        <button class="comic-btn">

            Baca Komik

        </button>

    </div>

</div>

</template>


<script src="js/storage.js"></script>
<script src="js/comics-data.js"></script>
<script src="js/explore.js"></script>

</body>
</html>
