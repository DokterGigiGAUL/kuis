<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Explore</title>

    <link rel="stylesheet"
          href="css/style.css">

    <style>
    @media (min-width: 768px) {
    .container {
        padding-left: 30px;
        padding-right: 30px!important;
    }
    
    .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 24px;
    }
}
    </style>
</head>

<body>
<header class="explore-header">
    <button class="back-btn" onclick="history.back()">
        ←
    </button>

    <h1 id="pageTitle">
        Semua Kuis
    </h1>
</header>
<main class="container">
    <div class="explore-tabs">
        <button
            id="quizTab"
            class="tab-btn">
            Kuis
        </button>

        <button
            id="comicTab"
            class="tab-btn">
            Komik
        </button>
    </div>

    <section
        id="quiz-list"
        class="card-grid">

    </section>

    <section
        id="comics-container"
        class="card-grid">
    </section>

</main>

<!-- TEMPLATE QUIZ -->

<template id="quiz-card-template">
    
<div class="quiz-card">
    <img class="quiz-thumbnail">
    <div class="quiz-content">
        <h3 class="quiz-title"></h3>
        <p class="quiz-description"></p>
        <div class="quiz-info">
            <span>📄 10 Soal</span>
            <span>⏱ 10 Menit</span>
        </div>
        <button class="start-btn">
            Mulai Kuis
        </button>
    </div>
</div>
    
</template>



<!-- TEMPLATE KOMIK -->

<template id="comic-card-template">

<div class="comic-card">
    <div class="comic-cover">
        <img class="comic-thumb">
        <div class="comic-overlay">
            <div class="comic-episode"></div>
            <h3 class="comic-title"></h3>
        </div>
    </div>

    <div class="comic-content">
        <button class="start-btn2">
            Baca Komik
        </button>
    </div>
</div>

</template>


<script src="js/storage.js"></script>
<script src="js/comics-data.js"></script>
<script src="js/explore.js"></script>

</body>
</html>
