<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Explore</title>

    <link rel="stylesheet" href="css/style.css" />

    <style>
          @media (min-width: 768px) {
          .container {
              padding-left: 30px;
              padding-right: 30px!important;
          }

          .card-grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 24px;
          margin-top: 24px;
          }
      }
    </style>
  </head>

  <body>
    <header class="explore-header">
      <button class="explore-back-btn" onclick="history.back()">←</button>

      <h1 id="pageTitle">Semua Kuis</h1>
    </header>

    <main class="container">
      <div class="explore-tabs">
        <button id="quizTab" class="tab-btn">Kuis</button>
        <button id="ttsTab" class="tab-btn">TTS</button>
        <button id="caseTab" class="tab-btn">Kasus</button>
        <button id="comicTab" class="tab-btn">Komik</button>
      </div>

      <section id="quiz-list" class="card-grid"></section>
      <section id="tts-container" class="tts-grid"></section>
      <section id="case-container" class="card-grid"></section>
      <section id="comics-container" class="card-grid"></section>
    </main>

    <!-- TEMPLATE QUIZ -->

    <template id="quiz-card-template">
      <article class="quiz-card">
        <img class="quiz-thumbnail" loading="lazy" alt="Thumbnail Kuis">

        <div class="quiz-content">
          <h3 class="quiz-title"></h3>
          <p class="quiz-description"></p>
          <div class="quiz-info">
            <span>📄 10 Soal</span>
            <span>⏱ 10 Menit</span>
          </div>
          <button class="btn btn-outline quiz-btn">Mulai Kuis</button>
        </div>
      </article>
    </template>

    <template id="comic-list-template">
      <article class="comic-list-item">
        <img class="comic-list-thumb" src="" alt="" />

        <div class="comic-list-info">
          <div class="comic-list-episode"></div>
          <h3 class="comic-list-title"></h3>
        </div>

        <button class="btn btn-outline comic-btn-list">Baca</button>
      </article>
    </template>

    <template id="tts-card-template">
      <article class="tts-list-card">
        <img class="tts-list-thumb" loading="lazy" alt="Thumbnail TTS" />

        <div class="tts-list-info">
          <h3 class="tts-list-title"></h3>

          <p class="tts-list-soal"></p>
        </div>

        <button class="btn btn-outline tts-btn-list">Isi</button>
      </article>
    </template>

    <template id="case-card-template">
    <article class="quiz-card">
        <img
            class="case-thumbnail"
            src=""
            loading="lazy"
            alt="Thumbnail Kasus">

        <div class="quiz-content">
            <h3 class="case-title"></h3>
            <p class="case-description"></p>
            <button class="btn btn-outline case-btn">
                Buka Kasus
            </button>
        </div>
    </article>
</template>

    <script src="js/storage.js"></script>
    <script src="js/quiz-data.js"></script>
    <script src="js/comics-data.js"></script>
    <script src="js/tts-data.js"></script>
    <script src="js/case-data.js"></script>
    <script src="js/explore.js"></script>
  </body>
</html>
